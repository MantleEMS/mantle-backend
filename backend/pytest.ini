[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
markers =
    unit: Unit tests — no external dependencies
    integration: Integration tests — require TEST_DATABASE_URL (PostgreSQL)
    e2e: End-to-end tests — require PostgreSQL + Ollama running with the configured model
addopts = -v --tb=short -m "not integration and not e2e" --html=tests/reports/report.html --self-contained-html
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s — %(message)s
log_file = tests/reports/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s %(levelname)s %(name)s — %(message)s
