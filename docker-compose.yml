version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mantle-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://mantle:mantle_secret@postgres:5432/mantle_ems_test
      TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://mantle:mantle_secret@postgres:5432/mantle_ems
    volumes:
      - ./backend:/app
      - ./backend/data/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantle-net

  postgres:
    image: postgres:16-alpine
    container_name: mantle-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mantle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mantle_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mantle_ems}
    volumes:
      - ./backend/data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mantle} -d ${POSTGRES_DB:-mantle_ems}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mantle-net

  redis:
    image: redis:7-alpine
    container_name: mantle-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./backend/data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - mantle-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mantle-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mantle.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - mantle-net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: mantle-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - mantle-net

volumes:
  pgadmin_data:

networks:
  mantle-net:
    driver: bridge
